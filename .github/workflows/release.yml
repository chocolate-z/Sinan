name: Release (desktop)

# 触发:推送 v* 标签 或 手动(workflow_dispatch)。在 windows runner 上:
#   ① 冻结两个 sidecar(engine=PyInstaller / api=node+esbuild bundle,经 scripts/build-sidecars.mjs)
#   ② tauri build 把 sidecars/ 打进安装包 → 起草 GitHub Release(草稿,人工复核后发布)。
# v1 仅 Windows(sidecar staging 含平台特定 @napi-rs/keyring-win32-x64-msvc 与 PyInstaller 产物)。
# 自动更新签名:配 TAURI_SIGNING_PRIVATE_KEY(Ed25519)后取消注释。
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 用默认 crates.io(境外 runner 不走国内镜像)
        shell: bash
        run: rm -f .cargo/config.toml

      - run: pnpm install

      - name: 安装 engine 运行依赖 + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/shared-contracts/python -e "services/engine[lightgbm]"
          pip install pyinstaller

      - name: 冻结 sidecars(engine PyInstaller + api esbuild bundle + node/keyring)
        env:
          SINAN_PYTHON: python
        run: node scripts/build-sidecars.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 在线更新:签名 bundle + 自动生成上传 latest.json(updater 据此校验)。
          # 私钥放仓库 Secret TAURI_SIGNING_PRIVATE_KEY;生成时用空密码故密码留空字符串。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-v__VERSION__' }}
          releaseName: '司南 Sinan v__VERSION__'
          releaseBody: |
            司南 Sinan 桌面端可分发构建(beta)。全本机运行 · BYO 数据源(自备 Tushare/AkShare token)。
            ⚠️ 仅研究参考,不构成投资建议;模拟盘为纸面前向验证,不下任何真实单。日频 · T+1 · 不支持分时。
            首次启动会拉起本地引擎与网关(约需十几秒);token 仅加密存本机 OS 钥匙串,绝不外联。

            ---
            🇨🇳 **国内下载**:GitHub 安装包 CDN 在国内常被拒连。若点击下方资源下不动,请在其下载链接**前面拼上镜像前缀**
            `https://gh-proxy.com/`(失效则换 `https://ghfast.top/` 或 `https://ghproxy.net/`)。例:
            `https://gh-proxy.com/https://github.com/chocolate-z/Sinan/releases/download/<tag>/Sinan_<ver>_x64-setup.exe`
          # 自动发布(非草稿):构建完直接公开 Release,公开页面可见 + 在线更新立即生效
          # (updater 的 latest 端点只解析已发布的非 prerelease)。已反复验证构建,适合个人项目。
          releaseDraft: false
          prerelease: false

      # updater 国内化:tauri-action 生成的 latest.json 里下载地址指向被墙的 GitHub 资产 CDN。
      # 这里复制一份 latest-cn.json,把下载地址前缀成公共镜像(gh-proxy)。tauri.conf 的 updater
      # 端点「latest-cn.json(镜像)优先、latest.json(GitHub)兜底」→ 国内走镜像、海外走原站。
      # 签名是对文件内容签的、与下载源无关 → 镜像下载仍验签通过。仅 tag 发布时产出。
      - name: 生成国内镜像版 latest-cn.json(updater 国内化)
        if: github.ref_type == 'tag'
        continue-on-error: true # 国内化尽力而为:此步失败不拖红已成功发布的 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          gh release download "$TAG" --pattern latest.json --clobber
          node -e '
            const fs = require("fs");
            const PREFIX = "https://gh-proxy.com/";
            const j = JSON.parse(fs.readFileSync("latest.json", "utf8"));
            for (const k of Object.keys(j.platforms || {})) {
              const u = j.platforms[k].url;
              if (u && !u.startsWith(PREFIX)) j.platforms[k].url = PREFIX + u;
            }
            fs.writeFileSync("latest-cn.json", JSON.stringify(j, null, 2));
            console.log("latest-cn.json platforms:", JSON.stringify(j.platforms, null, 2));
          '
          gh release upload "$TAG" latest-cn.json --clobber
