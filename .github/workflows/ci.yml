name: CI

# 私有仓库同样可用(消耗 Actions 额度:Linux 1x)。全部在 GitHub 托管 runner 上跑,
# 使用默认 crates.io / npm / PyPI(在 GitHub 基础设施上更快);国内镜像仅用于本地开发。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: contracts / api / frontend (Node) + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install

      - name: shared-contracts (build + vitest)
        working-directory: packages/shared-contracts
        run: |
          node node_modules/typescript/bin/tsc -p tsconfig.json
          node node_modules/vitest/vitest.mjs run

      - name: api (build + node:test)
        working-directory: services/api
        run: |
          node node_modules/typescript/bin/tsc -p tsconfig.build.json
          node --test "dist/test/*.test.js"

      - name: frontend (vue-tsc + vitest + build)
        working-directory: apps/desktop
        run: |
          node node_modules/vue-tsc/bin/vue-tsc.js --noEmit -p tsconfig.app.json
          node node_modules/vitest/vitest.mjs run
          node node_modules/vite/bin/vite.js build

      - name: lint + format
        run: |
          node node_modules/eslint/bin/eslint.js .
          node node_modules/prettier/bin/prettier.cjs --check .

  python:
    name: contracts + engine (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/shared-contracts/python -e "services/engine[test]"
      - name: contracts python tests
        run: pytest packages/shared-contracts/python/tests -q
      - name: engine tests
        working-directory: services/engine
        run: pytest -q

  rust:
    name: shell-core (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/shell-core
      - name: cargo test
        working-directory: apps/desktop/shell-core
        run: cargo test
